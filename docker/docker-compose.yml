version: "3.7" #
services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mysqlDataBase
    restart: always
    ports:
      - 23306:3306
    environment:
      MYSQL_ROOT_PASSWORD: "54321.#"
      MYSQL_DATABASE: "master"
      MYSQL_USER: "SecuTech"
      MYSQL_PASSWORD: "Tech.#"
      #configuración de la persistencia
    volumes:
      - ./schemas:/var/lib/mysql:rw
    networks:
      mysql_network:
        aliases:
          - mysql_host
volumes:
  schemas: {}
networks:
  mysql_network:
    name: mysql_net
    driver: bridge

