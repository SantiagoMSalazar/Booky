<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Initio</title>
</head>
<body>
<h1 class"title">Tabla de concursantes</h1>
    <table class="table table-light">
        <thead class="thead-light">
            <tr>
                <th>Código de ID</th>
                <th>Telefono</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in Clientes %}
                <tr>
                <td>{{cliente[0]}}</td>
                <td>{{cliente[3]}}</td>
                <td>{{cliente[1]}}</td>
                <td>{{cliente[2]}}</td>
                <td>
                    <a href="/edit/{{cliente[0]}}">Editar</a> |
                    <a href="/destroy/{{cliente[0]}}">Eliminar</a>
                </td>
            </tr>  
            {% endfor %}

        </tbody>
    </table>
<form action="/create">
<input type="submit" href="/create" value="Nuevo registro">
</form>
</body>
</html>
